<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — InvestPro Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="../images/favicon.png" />
<script src="../js/preview-gate.js"></script>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-default-role="tenant">

<header class="site-header">
  <div class="container">
    <a href="../index.html" class="brand"><img src="../images/logo.png" alt="InvestPro Realty" class="brand-logo" /><span class="brand-tag">Las Vegas, NV</span></a>
    <button class="menu-toggle" aria-label="Toggle menu"><span></span></button>
    <nav class="nav"><ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="../property-management.html">Property Management</a></li>
      <li><a href="../listings.html">Listings</a></li>
      <li><a href="../contact.html">Contact</a></li>
    </ul></nav>
  </div>
</header>

<section class="auth-wrap">
  <div class="auth-card">
    <div class="center">
      <h1>Welcome back</h1>
      <p class="muted">Log in to your owner or tenant portal.</p>
    </div>

    <div id="banner-area"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required autocomplete="current-password" minlength="4" />
        <div class="form-help"><a href="reset.html">Forgot password?</a></div>
      </div>
      <!-- Role dropdown removed 2026-04-30: role comes from each user's account profile in Supabase,
           so the dropdown was purely cosmetic and confusing reviewers (Helen reported it as a bug).
           Demo mode falls back to email-pattern detection (see guessRoleFromEmail in auth.js). -->
      <p class="form-help" style="text-align:center;margin: -.5rem 0 1rem;color:#6B7280;">
        Your dashboard is set automatically based on your account.
      </p>
      <button type="submit" class="btn btn-primary btn-block">Log in</button>
    </form>

    <div class="switch">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>
</section>

<footer class="site-footer">
  <div class="container footer-bottom"><span>&copy; <span data-year>2026</span> InvestPro Realty.</span><span><a href="../index.html">Back to website</a></span></div>
</footer>

<script src="../js/main.js"></script>
<script src="../js/auth.js"></script>
<script>
  // Safety net: if the user lands on /login.html with a recovery hash
  // (e.g., from an older email that pointed here before we built reset-password.html),
  // forward them to the proper set-new-password page instead of trapping them in a loop.
  if (location.hash.includes('type=recovery') || location.hash.includes('access_token')) {
    location.replace('/portal/reset-password.html' + location.hash);
  }

  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const banner = document.getElementById('banner-area');
    banner.innerHTML = '';
    if (window.investproAuth.isDemoMode()) {
      banner.innerHTML = '<div class="banner banner-info">Demo mode is on. Any email + password (4+ chars) will log you in. See <a href="../README.md">README</a> to enable real Supabase auth.</div>';
    }
    // No role hint needed — auth.js reads the user's role from their profile
    // in real Supabase mode, and falls back to guessRoleFromEmail() in demo mode.
    const res = await window.investproAuth.signIn({
      email: fd.get('email'),
      password: fd.get('password')
    });
    if (!res.ok) {
      banner.innerHTML = '<div class="banner banner-error">' + (res.error || 'Login failed.') + '</div>';
      return;
    }
    // Use the explicit role-based redirect from auth.js
    location.href = res.redirectTo || window.investproAuth.homeForRole(res.role);
  });
</script>
</body>
</html>
