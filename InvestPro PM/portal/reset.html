<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset Password — InvestPro Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="../images/favicon.png" />
<script src="../js/preview-gate.js"></script>
<link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="../index.html" class="brand"><img src="../images/logo.png" alt="InvestPro Realty" class="brand-logo" /><span class="brand-tag">Las Vegas, NV</span></a>
    <button class="menu-toggle" aria-label="Toggle menu"><span></span></button>
    <nav class="nav"><ul><li><a href="../index.html">Home</a></li><li><a href="login.html">Log in</a></li></ul></nav>
  </div>
</header>

<section class="auth-wrap">
  <div class="auth-card">
    <div class="center"><h1>Reset Password</h1><p class="muted">Enter your email and we'll send a reset link.</p></div>
    <div id="banner-area"></div>
    <form id="resetForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required autocomplete="email" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
    </form>
    <div class="switch"><a href="login.html">← Back to login</a></div>
  </div>
</section>

<script src="../js/main.js"></script>
<script src="../js/auth.js"></script>
<script>
  document.getElementById('resetForm').addEventListener('submit', async function(e){
    e.preventDefault();
    const fd = new FormData(e.target);
    const res = await window.investproAuth.resetPassword(fd.get('email'));
    const banner = document.getElementById('banner-area');
    if (res.ok) banner.innerHTML = '<div class="banner banner-success">Reset link sent (or in demo mode, simulated). Check your email.</div>';
    else banner.innerHTML = '<div class="banner banner-error">' + (res.error || 'Failed.') + '</div>';
  });
</script>
</body>
</html>
