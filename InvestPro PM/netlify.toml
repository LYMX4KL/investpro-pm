# ============================================================
# Netlify build & functions configuration
# ============================================================
# Netlify reads this file from the project's BASE directory.
# In Netlify Site settings → Build & deploy → Build settings,
# make sure:
#   * Base directory     = InvestPro PM
#   * Publish directory  = . (just a dot — relative to base)
#   * Functions directory = netlify/functions (relative to base)
#
# Or alternatively, leave Base empty and set:
#   * Publish directory  = InvestPro PM
#   * Functions directory = InvestPro PM/netlify/functions
# ============================================================

[build]
  publish = "."
  functions = "netlify/functions"
  # No build command — this is a static site with serverless functions
  command = "echo 'No build step required — static site'"

[functions]
  # Bundle node_modules with each function
  node_bundler = "esbuild"

# Optional: add response headers to harden the static site a bit
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options       = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy       = "strict-origin-when-cross-origin"
